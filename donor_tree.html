{% extends "base.html" %}
{% block content %}
<h1>Infrastructure Donor Tree</h1>

<div class="tree-container">
    <!-- SVG Tree Background -->
    <svg class="tree-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMax meet">
        <!-- Roots and base -->
        <path d="M 360 600 Q 380 550 400 500 Q 420 550 440 600 Z" fill="#2d1a11" />
        <path d="M 330 600 Q 360 580 370 550 Q 380 580 400 600 Z" fill="#3a2216" />
        <path d="M 470 600 Q 440 580 430 550 Q 420 580 400 600 Z" fill="#1f120c" />

        <!-- Main Trunk -->
        <path d="M 370 550 C 370 400, 380 300, 390 200 C 400 300, 420 400, 430 550 Z" fill="#2d1a11" />
        <path d="M 380 550 C 380 400, 385 300, 395 200 C 400 300, 410 400, 415 550 Z" fill="#3a2216" />

        <!-- Left Branches -->
        <path d="M 385 350 Q 250 280 150 250 Q 250 300 380 380 Z" fill="#2d1a11" />
        <path d="M 220 270 Q 150 200 80 150 Q 150 220 230 280 Z" fill="#2d1a11" />
        <path d="M 388 280 Q 280 180 200 100 Q 280 200 385 320 Z" fill="#2d1a11" />
        <path d="M 250 140 Q 180 80 100 50 Q 180 100 260 160 Z" fill="#3a2216" />

        <!-- Right Branches -->
        <path d="M 415 350 Q 550 280 650 250 Q 550 300 420 380 Z" fill="#1f120c" />
        <path d="M 580 270 Q 650 200 720 150 Q 650 220 570 280 Z" fill="#2d1a11" />
        <path d="M 412 280 Q 520 180 600 100 Q 520 200 415 320 Z" fill="#2d1a11" />
        <path d="M 550 140 Q 620 80 700 50 Q 620 100 540 160 Z" fill="#3a2216" />

        <!-- Top Branches -->
        <path d="M 395 200 Q 350 100 300 20 Q 360 120 400 220 Z" fill="#2d1a11" />
        <path d="M 395 200 Q 450 100 500 20 Q 440 120 400 220 Z" fill="#3a2216" />
        <path d="M 395 200 Q 400 80 400 0 Q 390 80 395 220 Z" fill="#1f120c" />

        <!-- Green Leaves -->
        <g opacity="0.85">
            <path d="M 120 220 Q 140 200 160 220 Q 140 240 120 220 Z" fill="#2E7D32" />
            <path d="M 90 130 Q 110 110 130 130 Q 110 150 90 130 Z" fill="#4CAF50" />
            <path d="M 160 80 Q 180 60 200 80 Q 180 100 160 80 Z" fill="#388E3C" />
            <path d="M 230 130 Q 250 110 270 130 Q 250 150 230 130 Z" fill="#2E7D32" />

            <path d="M 280 40 Q 300 10 330 40 Q 300 60 280 40 Z" fill="#4CAF50" />
            <path d="M 360 10 Q 380 -10 400 10 Q 380 30 360 10 Z" fill="#81C784" />
            <path d="M 440 30 Q 460 0 490 30 Q 460 50 440 30 Z" fill="#388E3C" />

            <path d="M 520 80 Q 550 50 580 80 Q 550 100 520 80 Z" fill="#4CAF50" />
            <path d="M 610 120 Q 640 90 670 120 Q 640 140 610 120 Z" fill="#2E7D32" />
            <path d="M 660 190 Q 690 160 720 190 Q 690 210 660 190 Z" fill="#81C784" />
            <path d="M 580 230 Q 600 200 630 230 Q 600 260 580 230 Z" fill="#388E3C" />

            <!-- Additional filling leaves -->
            <path d="M 200 180 Q 220 160 240 180 Q 220 200 200 180 Z" fill="#81C784" />
            <path d="M 320 180 Q 340 160 360 180 Q 340 200 320 180 Z" fill="#4CAF50" />
            <path d="M 460 150 Q 480 130 500 150 Q 480 170 460 150 Z" fill="#2E7D32" />
            <path d="M 500 240 Q 520 220 540 240 Q 520 260 500 240 Z" fill="#4CAF50" />
            <path d="M 300 280 Q 320 260 340 280 Q 320 300 300 280 Z" fill="#388E3C" />

            <!-- Lower leaves -->
            <path d="M 170 290 Q 190 270 210 290 Q 190 310 170 290 Z" fill="#2E7D32" />
            <path d="M 480 320 Q 500 300 520 320 Q 500 340 480 320 Z" fill="#81C784" />
        </g>
    </svg>

    <div class="branches-wrapper">
        {% for donor in donors %}
        <div class="donor-plaque pos-{{ loop.index % 15 }}">
            {{ donor }}
        </div>
        {% endfor %}
    </div>
</div>

<style>
    .tree-container {
        position: relative;
        height: 700px;
        width: 100%;
        max-width: 900px;
        margin: 40px auto;
        background: radial-gradient(circle at center, rgba(37, 99, 235, 0.05), transparent 75%);
        border-radius: 20px;
        overflow: hidden;
    }

    .tree-svg {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: auto;
        height: 90%;
        z-index: 1;
        opacity: 0.95;
        filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.2));
    }

    .branches-wrapper {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
        pointer-events: none;
        /* Let clicks pass through if needed, though plaques will capture them */
    }

    .donor-plaque {
        /* Premium Golden metallic look matching the image */
        background: linear-gradient(135deg, #f3d674 0%, #d4af37 40%, #aa8021 100%);
        color: #3b2c0a;
        padding: 12px 20px;
        border-radius: 40px 10px 40px 10px;
        /* Leaf shape */
        font-weight: 700;
        font-size: 14px;
        box-shadow: 3px 5px 12px rgba(0, 0, 0, 0.3), inset 1px 2px 2px rgba(255, 255, 255, 0.4);
        border: 2px solid #edc967;
        text-align: center;
        min-width: 160px;
        max-width: 220px;
        position: absolute;
        pointer-events: auto;
        /* Enable hover/clicks on plaques */
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        line-height: 1.3;
        transform: translate(-50%, -50%);
    }

    .donor-plaque:hover {
        transform: translate(-50%, -50%) scale(1.1);
        box-shadow: 5px 10px 20px rgba(0, 0, 0, 0.4), inset 1px 2px 2px rgba(255, 255, 255, 0.6);
        background: linear-gradient(135deg, #ffe17d 0%, #ddb742 40%, #b88d2b 100%);
        z-index: 10;
    }

    /* Small leaf accents on plaques */
    .donor-plaque::before {
        content: '';
        position: absolute;
        width: 18px;
        height: 10px;
        background: #277943;
        border-radius: 20px 0;
        top: -6px;
        left: 15px;
        box-shadow: 1px 1px 3px rgba(0, 0, 0, 0.2);
        z-index: -1;
    }

    .donor-plaque::after {
        content: '';
        position: absolute;
        width: 14px;
        height: 8px;
        background: #349554;
        border-radius: 15px 0;
        bottom: -4px;
        right: 20px;
        box-shadow: 1px 1px 3px rgba(0, 0, 0, 0.2);
        z-index: -1;
        transform: rotate(180deg);
    }

    /* Organic Positioning using 15 predefined spots over the branches */
    .pos-0 {
        top: 20%;
        left: 30%;
    }

    .pos-1 {
        top: 25%;
        left: 65%;
    }

    .pos-2 {
        top: 35%;
        left: 20%;
    }

    .pos-3 {
        top: 40%;
        left: 75%;
    }

    .pos-4 {
        top: 15%;
        left: 45%;
    }

    .pos-5 {
        top: 18%;
        left: 58%;
    }

    .pos-6 {
        top: 45%;
        left: 35%;
    }

    .pos-7 {
        top: 50%;
        left: 65%;
    }

    .pos-8 {
        top: 30%;
        left: 40%;
    }

    .pos-9 {
        top: 10%;
        left: 35%;
    }

    .pos-10 {
        top: 32%;
        left: 80%;
    }

    .pos-11 {
        top: 28%;
        left: 15%;
    }

    .pos-12 {
        top: 55%;
        left: 25%;
    }

    .pos-13 {
        top: 60%;
        left: 75%;
    }

    .pos-14 {
        top: 8%;
        left: 52%;
    }
</style>

{% if not donors %}
<div class="card" style="text-align: center; margin-top: 40px; position:relative; z-index: 10;">
    <h3>No Donors Found</h3>
    <p>Please upload infrastructure funding data to generate the Donor Tree.</p>
</div>
{% endif %}
{% endblock %}
