{% extends "base.html" %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto; padding-top: 40px;">

    <div class="card">
        <h2 style="margin-top: 0; margin-bottom: 24px; font-size: 24px;">Update Password</h2>

        {% if error %}
        <div
            style="background-color: #fee2e2; color: #ef4444; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; font-weight: 500;">
            {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div
            style="background-color: #dcfce3; color: #16a34a; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; font-weight: 500;">
            {{ success }}
        </div>
        {% endif %}

        <form action="{{ url_for('update_password') }}" method="POST">

            <div style="margin-bottom: 20px;">
                <label for="current_password"
                    style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 14px;">Current
                    Password</label>
                <input type="password" id="current_password" name="current_password" required
                    style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; font-family: inherit; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 20px;">
                <label for="new_password"
                    style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 14px;">New
                    Password</label>
                <input type="password" id="new_password" name="new_password" required minlength="6"
                    style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; font-family: inherit; box-sizing: border-box;">
                <small style="color: #64748b; font-size: 12px; display: block; margin-top: 6px;">Must be at least 6
                    characters.</small>
            </div>

            <div style="margin-bottom: 24px;">
                <label for="confirm_password"
                    style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 14px;">Confirm
                    New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6"
                    style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; font-family: inherit; box-sizing: border-box;">
            </div>

            <button type="submit"
                style="width: 100%; background-color: #2563eb; color: #ffffff; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;">
                Update Password
            </button>

        </form>
    </div>
</div>
{% endblock %}
